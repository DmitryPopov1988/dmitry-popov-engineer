    bootTerminal({

        { kind: "cmd", text: "role" },

        { kind: "cmd", text: "stack" },
        { kind: "out", html: '<span class="tok-key">backend</span>:       Java 11/17/25, Spring (Boot, MVC, Data, Security)' },
        { kind: "out", html: '<span class="tok-key">web</span>:           TypeScript, JavaScript, Node.js, Express' },
        { kind: "out", html: '<span class="tok-key">data</span>:          PostgreSQL, MongoDB, Apache Cassandra, Liquibase' },
        { kind: "out", html: '<span class="tok-key">messaging</span>:     ActiveMQ' },
        { kind: "out", html: '<span class="tok-key">infra</span>:         Docker, Kubernetes, Terraform, Jenkins, Puppet, Rundeck' },
        { kind: "out", html: '<span class="tok-key">testing</span>:       JUnit, AssertJ, JBehave, Cucumber, Jest, Playwright' },
        { kind: "out", html: '<span class="tok-key">observability</span>: Grafana, Kibana, OpenSearch, Dynatrace, New Relic' },
        { kind: "out", html: '<span class="tok-key">vcs</span>:           GitHub, GitLab, BitBucket' },
        { kind: "out", html: '<span class="tok-key">ai tools</span>:      Cursor, Windsurf, Codex' },
        { kind: "gap" },

        { kind: "cmd", text: "certifications" },
        { kind: "out", html: '  - AWS Certified Cloud Practitioner' },
        { kind: "out", html: '  - AWS Certified AI Practitioner' },
        { kind: "gap" },

        { kind: "cmd", text: "help" },
        { kind: "out", html: '<span class="tok-muted">Try:</span> <span class="tok-key">experience</span>, <span class="tok-key">projects</span>, <span class="tok-key">contact</span>, <span class="tok-key">cv</span> or <span class="tok-key">help</span>' }
      ]
    });
