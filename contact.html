    bootTerminal({
      page: "contact",

        { kind: "gap" },
        { kind: "cmd", text: "cat availability.txt" },
        { kind: "out", html: '<span class="tok-muted">Replies within ~24h on weekdays.</span>' },
        { kind: "gap" },
        { kind: "cmd", text: "help" },
        { kind: "out", html: '<span class="tok-muted">Try:</span> <span class="tok-key">whoami</span>, <span class="tok-key">experience</span>, <span class="tok-key">projects</span>, <span class="tok-key">cv</span> or <span class="tok-key">help</span>' }
